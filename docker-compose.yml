services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ecommerce_agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent_dev_password
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d ecommerce_agent"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: agent
      MINIO_ROOT_PASSWORD: agent_dev_password
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
  api:
    build: .
    environment:
      STATE_BACKEND: database
      DATABASE_URL: postgresql+psycopg://agent:agent_dev_password@postgres:5432/ecommerce_agent
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  worker:
    build: .
    command: celery -A ecommerce_agent.workers.celery_app:celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://agent:agent_dev_password@postgres:5432/ecommerce_agent
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }

volumes:
  postgres_data:
  minio_data:
