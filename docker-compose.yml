services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_agent}
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_dev_password}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6379}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agent}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agent_dev_password}
    ports: ["${MINIO_PORT:-9000}:9000", "${MINIO_CONSOLE_PORT:-9001}:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
  api:
    build: .
    environment:
      APP_ENV: ${APP_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-me}
      STATE_BACKEND: database
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-agent_dev_password}@postgres:5432/${POSTGRES_DB:-ecommerce_agent}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-agent}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-agent_dev_password}
    ports: ["${API_PORT:-8000}:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1G }
  worker:
    build: .
    command: celery -A ecommerce_agent.workers.celery_app:celery_app worker --loglevel=INFO
    environment:
      APP_ENV: ${APP_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-me}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-agent_dev_password}@postgres:5432/${POSTGRES_DB:-ecommerce_agent}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "celery -A ecommerce_agent.workers.celery_app:celery_app inspect ping --timeout=5 | grep -q pong"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1G }

volumes:
  postgres_data:
  minio_data:
